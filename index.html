<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Courier New', sans-serif; text-align: center; padding: 15px; }
        .banner { font-size: 20px; font-weight: bold; color: #00ff00; border: 2px solid #00ff00; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-shadow: 0 0 10px #00ff00; }
        input, select { width: 90%; padding: 12px; margin: 8px 0; border-radius: 5px; background: #1a1a1a; border: 1px solid #333; color: white; }
        button { width: 92%; padding: 12px; margin: 5px 0; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        .btn-save { background: #ffcc00; color: black; }
        .btn-download { background: #ff0000; color: white; }
        canvas { max-width: 100%; height: auto; border: 2px solid #333; cursor: crosshair; }
    </style>
</head>
<body>
    <div class="banner">AI DP MAKER</div>
    
    <input type="text" id="nameInput" placeholder="Name ya Poetry likho...">
    
    <select id="styleSelect">
        <option value="neon">Neon Green</option>
        <option value="gold">Luxury Gold</option>
        <option value="matrix">Matrix Style</option>
        <option value="blood">Blood Red</option>
    </select>

    <input type="file" id="imageInput" accept="image/*">
    <button style="background: #008cff;" onclick="loadPic()">LOAD PIC</button>
    <button class="btn-save" onclick="saveText()">SAVE TEXT TO PIC</button>
    <button class="btn-download" onclick="downloadDP()">DOWNLOAD DP</button>

    <div id="canvasContainer"><canvas id="myCanvas" style="display:none;"></canvas></div>
    
    <script>
        let img = new Image();
        let lastX = 0, lastY = 0;
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');
        const styles = {
            neon: { color: "#00ff00", font: "bold 80px Arial" },
            gold: { color: "#FFD700", font: "italic 80px Times New Roman" },
            matrix: { color: "#00ff00", font: "bold 80px Courier" },
            blood: { color: "#8b0000", font: "bold 80px Arial" }
        };

        function loadPic() {
            const file = document.getElementById('imageInput').files[0];
            if(!file) return alert("Pehle pic select kro!");
            const reader = new FileReader();
            reader.onload = function(e) {
                img.onload = function() {
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    canvas.style.display = "block";
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        canvas.addEventListener('click', function(e) {
            // Sirf position update kr raha h, draw nahi kr raha
            const rect = canvas.getBoundingClientRect();
            lastX = (e.clientX - rect.left) * (canvas.width / rect.width);
            lastY = (e.clientY - rect.top) * (canvas.height / rect.height);
            alert("Position set! Ab 'SAVE TEXT' dabaein.");
        });

        function saveText() {
            const text = document.getElementById('nameInput').value;
            const styleKey = document.getElementById('styleSelect').value;
            const s = styles[styleKey];
            ctx.font = s.font;
            ctx.fillStyle = s.color;
            ctx.textAlign = "center";
            ctx.fillText(text, lastX, lastY);
        }

        function downloadDP() {
            const link = document.createElement('a');
            link.download = 'NawabZada_DP.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
