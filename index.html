<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Courier New', sans-serif; text-align: center; padding: 10px; }
        .banner { font-size: 20px; font-weight: bold; color: #00ff00; border: 2px solid #00ff00; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-shadow: 0 0 10px #00ff00; }
        input, select { width: 90%; padding: 10px; margin: 5px 0; border-radius: 5px; background: #1a1a1a; border: 1px solid #333; color: white; }
        button { width: 92%; padding: 10px; margin: 5px 0; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        .btn-ai { background: #00ff00; color: black; }
        .btn-save { background: #ffcc00; color: black; }
        .btn-download { background: #ff0000; color: white; }
        #canvasContainer { margin-top: 15px; }
        canvas { max-width: 100%; height: auto; border: 2px solid #333; cursor: crosshair; }
    </style>
</head>
<body>
    <div class="banner">AI DP Maker</div>
    
    <input type="text" id="nameInput" placeholder="Name ya Poetry likho...">
    <select id="styleSelect">
        <option value="neon">Neon Green</option>
        <option value="gold">Luxury Gold</option>
        <option value="matrix">Matrix Style</option>
        <option value="cyber">Cyberpunk</option>
        <option value="blood">Blood Red</option>
    </select>

    <button class="btn-ai" onclick="generateAI_DP()">GENERATE AI DP</button>
    <input type="file" id="imageInput" accept="image/*">
    <button style="background: #008cff;" onclick="loadPic()">LOAD PIC</button>
    <button class="btn-save" onclick="saveText()">SAVE TEXT TO PIC</button>
    <button class="btn-download" onclick="downloadDP()">DOWNLOAD DP</button>

    <div id="result"></div>
    <div id="canvasContainer"><canvas id="myCanvas" style="display:none;"></canvas></div>
    
    <footer style="margin-top:20px; color: #00ff00;">Created by Nawab ZADA HACKER 🦅</footer>

    <script>
        let img = new Image();
        let lastX = 0, lastY = 0;
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');
        const styles = {
            neon: { color: "#00ff00" },
            gold: { color: "#FFD700" },
            matrix: { color: "#00ff00" },
            cyber: { color: "#ff00ff" },
            blood: { color: "#8b0000" }
        };

        function generateAI_DP() {
            const name = document.getElementById('nameInput').value;
            if(!name) return alert("Naam likho!");
            const prompt = `3D stylish profile picture with name ${name}, high quality, dark background`;
            document.getElementById('result').innerHTML = `<img src="https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}" style="width:100%; border-radius:10px;">`;
        }

        function loadPic() {
            const file = document.getElementById('imageInput').files[0];
            if(!file) return alert("Pehle pic select kro!");
            const reader = new FileReader();
            reader.onload = function(e) {
                img.onload = function() {
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    canvas.style.display = "block";
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        canvas.addEventListener('click', function(e) {
            const rect = canvas.getBoundingClientRect();
            lastX = (e.clientX - rect.left) * (canvas.width / rect.width);
            lastY = (e.clientY - rect.top) * (canvas.height / rect.height);
        });

        function saveText() {
            const text = document.getElementById('nameInput').value;
            const styleKey = document.getElementById('styleSelect').value;
            const s = styles[styleKey];
            
            // Auto-resize logic
            let fontSize = 80;
            ctx.font = `bold ${fontSize}px Arial`;
            while(ctx.measureText(text).width > canvas.width * 0.9 && fontSize > 20) {
                fontSize -= 5;
                ctx.font = `bold ${fontSize}px Arial`;
            }
            
            ctx.fillStyle = s.color;
            ctx.textAlign = "center";
            ctx.fillText(text, lastX, lastY);
        }

        function downloadDP() {
            const link = document.createElement('a');
            link.download = 'NawabZada_DP.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
